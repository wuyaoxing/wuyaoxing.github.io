<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>Crane Perch Villa</title>
    <style>
        #app-loding {
            width: 50%;
            height: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            /*margin-top: -25%;*/
            margin-left: -25%;
            text-align: center;
        }
        .loading {
            display: inline-flex;
            position: relative;
            vertical-align: middle;
            margin: auto;
            width: auto;
            text-align: center;
        }
        .loading.\--smallest .loading__child {
            width: 8px;
            height: 8px;
        }
        .loading.\--smaller .loading__child {
            width: 12px;
            height: 12px;
        }
        .loading.\--small .loading__child {
            width: 14px;
            height: 14px;
        }
        .loading.\--medium .loading__child {
            width: 18px;
            height: 18px;
        }
        .loading.\--large .loading__child {
            width: 20px;
            height: 20px;
        }
        .loading__child {
            width: 18px;
            height: 18px;
            background-color: #27b6ba;
            border-radius: 100%;
            display: inline-block;
            animation: sk-threeBounceDelay 1.4s infinite ease-in-out both;
        }
        .loading .loading-bounce1 {
            animation-delay: -0.32s;
        }
        .loading .loading-bounce2 {
            animation-delay: -0.16s;
        }
        @-moz-keyframes sk-threeBounceDelay {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
        @-webkit-keyframes sk-threeBounceDelay {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
        @-o-keyframes sk-threeBounceDelay {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
        @keyframes sk-threeBounceDelay {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div id="app-loding">
        <div class="system-load-page animated js-app-loading-curtain fadeOut">
            <div class="system-load-page__loading-box">
                <span class="loading-large loading">
                    <div class="loading__child loading-bounce1"></div>
                    <div class="loading__child loading-bounce2"></div>
                    <div class="loading__child loading-bounce3"></div>
                </span>
            </div>
        </div>
    </div>

<script>

    setTimeout(function () {
        window.location.href = '/public';
    }, 1500)

</script>
</body>
</html>
